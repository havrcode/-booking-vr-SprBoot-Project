server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:virtum_booking}
    username: ${DB_USER:virtum_booking}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
  servlet:
    multipart:
      max-file-size: ${PAYMENT_PROOF_MAX_FILE_SIZE:8MB}
      max-request-size: ${PAYMENT_PROOF_MAX_FILE_SIZE:8MB}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  booking:
    max-concurrent-bookings: ${MAX_CONCURRENT_BOOKINGS:2}
    open-time: "${BOOKING_OPEN_TIME:09:30}"
    close-time: "${BOOKING_CLOSE_TIME:20:30}"
    break-start: "${BOOKING_BREAK_START:14:30}"
    break-end: "${BOOKING_BREAK_END:15:30}"
    slot-step-minutes: ${BOOKING_SLOT_STEP_MINUTES:30}
  payment:
    pay-at-club-enabled: ${PAYMENT_PAY_AT_CLUB_ENABLED:true}
    card-transfer-enabled: ${PAYMENT_CARD_TRANSFER_ENABLED:false}
    card-holder: ${PAYMENT_CARD_HOLDER:}
    card-number: ${PAYMENT_CARD_NUMBER:}
    card-bank: ${PAYMENT_CARD_BANK:}
    card-transfer-note: ${PAYMENT_CARD_TRANSFER_NOTE:Після переказу можна додати скрін підтвердження.}
    proofs-dir: ${PAYMENT_PROOFS_DIR:data/payment-proofs}
    max-proof-size-bytes: ${PAYMENT_PROOF_MAX_BYTES:8388608}
  admin:
    api-key: ${ADMIN_API_KEY}
  cors:
    allowed-origins:
      - https://virtum-vr.com.ua
      - https://www.virtum-vr.com.ua
  notifications:
    telegram:
      enabled: ${TELEGRAM_NOTIFICATIONS_ENABLED:false}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
