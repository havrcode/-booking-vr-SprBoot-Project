spring:
  datasource:
    url: jdbc:h2:mem:bookingdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080

app:
  admin:
    api-key: ${ADMIN_API_KEY:dev-admin-key}
  cors:
    allowed-origins:
      - https://virtum-vr.com.ua
      - https://www.virtum-vr.com.ua
      - http://localhost:3000
      - http://localhost:5173
  integration:
    widget-script: "https://virtum-vr.com.ua/widget/booking.js"
  notifications:
    telegram:
      enabled: false
      bot-token:
      chat-id:
