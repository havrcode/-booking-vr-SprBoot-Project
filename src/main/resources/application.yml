spring:
  datasource:
    url: jdbc:h2:mem:bookingdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  servlet:
    multipart:
      max-file-size: ${PAYMENT_PROOF_MAX_FILE_SIZE:8MB}
      max-request-size: ${PAYMENT_PROOF_MAX_FILE_SIZE:8MB}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080

app:
  booking:
    max-concurrent-bookings: ${MAX_CONCURRENT_BOOKINGS:2}
    open-time: "${BOOKING_OPEN_TIME:09:30}"
    close-time: "${BOOKING_CLOSE_TIME:20:30}"
    break-start: "${BOOKING_BREAK_START:14:30}"
    break-end: "${BOOKING_BREAK_END:15:30}"
    slot-step-minutes: ${BOOKING_SLOT_STEP_MINUTES:60}
  payment:
    pay-at-club-enabled: ${PAYMENT_PAY_AT_CLUB_ENABLED:true}
    card-transfer-enabled: ${PAYMENT_CARD_TRANSFER_ENABLED:false}
    card-holder: ${PAYMENT_CARD_HOLDER:}
    card-number: ${PAYMENT_CARD_NUMBER:}
    card-bank: ${PAYMENT_CARD_BANK:}
    card-transfer-note: ${PAYMENT_CARD_TRANSFER_NOTE:Після переказу можна додати скрін підтвердження.}
    proofs-dir: ${PAYMENT_PROOFS_DIR:data/payment-proofs}
    max-proof-size-bytes: ${PAYMENT_PROOF_MAX_BYTES:8388608}
  admin:
    api-key: ${ADMIN_API_KEY:dev-admin-key}
  cors:
    allowed-origins:
      - https://virtum-vr.com.ua
      - https://www.virtum-vr.com.ua
      - http://localhost:3000
      - http://localhost:5173
      - http://127.0.0.1:5173
  integration:
    widget-script: "https://virtum-vr.com.ua/widget/booking.js"
  notifications:
    telegram:
      enabled: false
      bot-token:
      chat-id:
