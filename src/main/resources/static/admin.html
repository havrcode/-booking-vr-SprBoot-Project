<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Адмінка бронювань Virtum</title>
  <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Virtum VR</p>
        <h1>Адмінка</h1>
      </div>
      <form class="key-form" id="key-form">
        <label for="api-key">Ключ Admin API</label>
        <div class="key-row">
          <input id="api-key" name="apiKey" type="password" autocomplete="current-password">
          <button type="submit">Зберегти</button>
        </div>
      </form>
    </header>

    <nav class="tabs" aria-label="Розділи адмінки">
      <button class="tab-button active" id="booking-tab" type="button" aria-selected="true">Бронювання</button>
      <button class="tab-button" id="services-tab" type="button" aria-selected="false">Послуги</button>
      <button class="tab-button" id="availability-tab" type="button" aria-selected="false">Доступність</button>
    </nav>

    <section class="view" id="bookings-view">
      <section class="toolbar" aria-label="Фільтри бронювань">
        <label>
          Від
          <input id="from-date" type="date">
        </label>
        <label>
          До
          <input id="to-date" type="date">
        </label>
        <label>
          Статус
          <select id="status-filter">
            <option value="">Всі</option>
            <option value="CONFIRMED">Підтверджені</option>
            <option value="CANCELLED">Скасовані</option>
          </select>
        </label>
        <button id="refresh-button" type="button">Оновити</button>
      </section>

      <section class="summary" aria-label="Підсумок">
        <div>
          <span id="confirmed-count">0</span>
          <p>Підтверджені</p>
        </div>
        <div>
          <span id="cancelled-count">0</span>
          <p>Скасовані</p>
        </div>
        <div>
          <span id="total-count">0</span>
          <p>Всього</p>
        </div>
      </section>

      <section class="table-wrap" aria-label="Список бронювань">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Час</th>
              <th>Послуга</th>
              <th>Клієнт</th>
              <th>Контакти</th>
              <th>Оплата</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="booking-rows">
            <tr>
              <td colspan="8" class="empty">Завантаження...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </section>

    <section class="view" id="services-view" hidden>
      <form class="service-form" id="service-form">
        <input id="service-id" type="hidden">
        <div class="form-grid">
          <label>
            Код послуги
            <input id="service-slug" type="text" inputmode="latin" autocomplete="off" required maxlength="120" pattern="[a-z0-9]+(-[a-z0-9]+)*">
          </label>
          <label>
            Назва
            <input id="service-title" type="text" required maxlength="255">
          </label>
          <label>
            Тривалість, хв
            <input id="service-duration" type="number" required min="15" max="480" step="5">
          </label>
          <label>
            Ціна, грн
            <input id="service-price" type="number" required min="1" step="0.01">
          </label>
          <label class="checkbox-label">
            <input id="service-active" type="checkbox" checked>
            Активна
          </label>
        </div>
        <div class="form-actions">
          <button id="service-submit-button" type="submit">Створити</button>
          <button class="secondary-button" id="service-reset-button" type="button">Очистити</button>
        </div>
      </form>

      <section class="table-wrap" aria-label="Список послуг">
        <table class="services-table">
          <thead>
            <tr>
              <th>Послуга</th>
              <th>Slug</th>
              <th>Тривалість</th>
              <th>Ціна</th>
              <th>Статус</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="service-rows">
            <tr>
              <td colspan="6" class="empty">Завантаження...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </section>

    <section class="view" id="availability-view" hidden>
      <form class="availability-form" id="availability-form">
        <div class="form-grid availability-grid">
          <label>
            Початок
            <input id="availability-starts-at" type="datetime-local" required>
          </label>
          <label>
            Кінець
            <input id="availability-ends-at" type="datetime-local" required>
          </label>
          <label>
            Причина
            <input id="availability-reason" type="text" maxlength="255" placeholder="Технічна пауза, приватна подія...">
          </label>
        </div>
        <div class="form-actions">
          <button id="availability-submit-button" type="submit">Закрити час</button>
        </div>
      </form>

      <section class="toolbar" aria-label="Фільтри доступності">
        <label>
          Від
          <input id="availability-from-date" type="date">
        </label>
        <label>
          До
          <input id="availability-to-date" type="date">
        </label>
        <button id="availability-refresh-button" type="button">Оновити</button>
      </section>

      <section class="table-wrap" aria-label="Закриті слоти">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Час</th>
              <th>Причина</th>
              <th>Створено</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="availability-rows">
            <tr>
              <td colspan="5" class="empty">Завантаження...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </section>

    <p class="message" id="message" role="status"></p>
  </main>

  <script src="/admin/admin.js" defer></script>
</body>
</html>
