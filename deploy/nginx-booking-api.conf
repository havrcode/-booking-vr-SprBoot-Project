server {
    listen 80;
    listen [::]:80;
    server_name booking-api.virtum-vr.com.ua;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name booking-api.virtum-vr.com.ua;

    ssl_certificate /etc/letsencrypt/live/booking-api.virtum-vr.com.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booking-api.virtum-vr.com.ua/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

